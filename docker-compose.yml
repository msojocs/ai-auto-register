services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: free2api-server
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-change-me-16byte}
      - GIN_MODE=release
      - DB_DRIVER=postgres
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${POSTGRES_DB:-free2api}
      - DB_USER=${POSTGRES_USER:-free2api}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-free2api_pass}
    volumes:
      - server-data:/app/data
      # Mount config directory so config.yaml is available inside the container.
      - ./server/config:/app/config
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:16-alpine
    container_name: free2api-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-free2api}
      - POSTGRES_USER=${POSTGRES_USER:-free2api}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-free2api_pass}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-free2api} -d ${POSTGRES_DB:-free2api}"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: free2api-web
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - server

  token-server:
    build:
      context: ./third_party/openai
      dockerfile: Dockerfile
    container_name: free2api-token-server
    restart: unless-stopped
    ports:
      - "3001:3000"
volumes:
  server-data:
  postgres-data:
